<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .quiz-container {
      width: 100%;
      max-width: 900px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #38bdf8;
    }

    .top-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .score-box {
      background: rgba(255,255,255,0.08);
      padding: 10px 18px;
      border-radius: 14px;
      font-size: 15px;
    }

    .progress-container {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 25px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      transition: 0.4s;
    }

    .question {
      font-size: 22px;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .answers {
      display: grid;
      gap: 15px;
    }

    .answer-btn {
      background: rgba(255,255,255,0.08);
      border: 2px solid transparent;
      color: white;
      padding: 16px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 16px;
      text-align: left;
      transition: 0.3s;
    }

    .answer-btn:hover {
      transform: translateY(-2px);
      border-color: #38bdf8;
      background: rgba(56,189,248,0.12);
    }

    .correct {
      background: rgba(34,197,94,0.2) !important;
      border-color: #22c55e !important;
    }

    .wrong {
      background: rgba(239,68,68,0.2) !important;
      border-color: #ef4444 !important;
    }

    .explanation {
      margin-top: 25px;
      background: rgba(255,255,255,0.06);
      padding: 18px;
      border-radius: 16px;
      line-height: 1.6;
      display: none;
    }

    .next-btn {
      margin-top: 25px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
      display: none;
    }

    .next-btn:hover {
      transform: scale(1.02);
    }

    .result {
      text-align: center;
      display: none;
    }

    .result h2 {
      font-size: 36px;
      margin-bottom: 20px;
      color: #38bdf8;
    }

    .result p {
      font-size: 22px;
      margin: 10px 0;
    }

    .restart-btn {
      margin-top: 25px;
      padding: 15px 30px;
      border: none;
      border-radius: 16px;
      background: #22c55e;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    @media(max-width: 600px) {
      .question {
        font-size: 18px;
      }

      .answer-btn {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

<div class="quiz-container">

</div>

let currentIndex = 0;
let correct = 0;
let wrong = 0;

const questionText = document.getElementById('questionText');
const answersBox = document.getElementById('answersBox');
const explanationBox = document.getElementById('explanationBox');
const nextBtn = document.getElementById('nextBtn');
const correctCount = document.getElementById('correctCount');
const wrongCount = document.getElementById('wrongCount');
const currentQuestion = document.getElementById('currentQuestion');
const totalQuestion = document.getElementById('totalQuestion');
const progressBar = document.getElementById('progressBar');

const quizBox = document.getElementById('quizBox');
const resultBox = document.getElementById('resultBox');

const finalCorrect = document.getElementById('finalCorrect');
const finalWrong = document.getElementById('finalWrong');
const finalScore = document.getElementById('finalScore');

totalQuestion.innerText = questions.length;

function loadQuestion() {
  const q = questions[currentIndex];

  questionText.innerHTML = q.question;
  answersBox.innerHTML = '';
  explanationBox.style.display = 'none';
  nextBtn.style.display = 'none';

  currentQuestion.innerText = currentIndex + 1;

  progressBar.style.width = ((currentIndex) / questions.length) * 100 + '%';

  q.answers.forEach((answer, index) => {
    const btn = document.createElement('button');
    btn.classList.add('answer-btn');
    btn.innerHTML = answer;

    btn.onclick = () => checkAnswer(index, btn);

    answersBox.appendChild(btn);
  });
}

function checkAnswer(selected, button) {
  const q = questions[currentIndex];
  const buttons = document.querySelectorAll('.answer-btn');

  buttons.forEach(btn => btn.disabled = true);

  if (selected === q.correct) {
    button.classList.add('correct');
    correct++;
    correctCount.innerText = correct;

    explanationBox.innerHTML = '✅ Chính xác!<br><br>' + q.explain;
  } else {
    button.classList.add('wrong');
    buttons[q.correct].classList.add('correct');

    wrong++;
    wrongCount.innerText = wrong;

    explanationBox.innerHTML = `❌ Sai rồi!<br><br><b>Đáp án đúng:</b> ${q.answers[q.correct]}<br><br>${q.explain}`;
  }

  explanationBox.style.display = 'block';
  nextBtn.style.display = 'block';
}

nextBtn.onclick = () => {
  currentIndex++;

  if (currentIndex < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
};

function showResult() {
  quizBox.style.display = 'none';
  resultBox.style.display = 'block';

  finalCorrect.innerText = correct;
  finalWrong.innerText = wrong;

  const score = ((correct / questions.length) * 10).toFixed(1);
  finalScore.innerText = score;
}

function restartQuiz() {
  currentIndex = 0;
  correct = 0;
  wrong = 0;

  correctCount.innerText = 0;
  wrongCount.innerText = 0;

  quizBox.style.display = 'block';
  resultBox.style.display = 'none';

  loadQuestion();
}

loadQuestion();
