<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Văn Minh Đại Việt - Trắc Nghiệm Lịch Sử</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold-primary: #b8860b; 
            --royal-red: #8b0000;
            --paper-bg: #fdfaf1; 
            --text-dark: #2c2c2c;
            --correct-green: #2d6a4f;
            --wrong-red: #a4161a;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        body { 
            font-family: 'Lora', serif; 
            background-color: #f4eee0; 
            background-image: url("https://www.transparenttextures.com/patterns/parchment.png");
            color: var(--text-dark); 
            line-height: 1.7; 
            padding: 20px; 
            margin-top: 100px; 
        }
        
        /* Taskbar Hiện Đại */
        .taskbar {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: rgba(139, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-radius: 50px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border: 1px solid var(--gold-primary);
        }

        .stats-group { display: flex; gap: 20px; }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-value { font-size: 1.2em; font-weight: bold; color: var(--gold-primary); }
        .stat-label { font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px; }

        .container { 
            max-width: 850px; 
            margin: auto; 
            background: var(--paper-bg); 
            padding: 50px; 
            border-radius: 4px; 
            box-shadow: var(--card-shadow);
            border: 1px solid #e2d1b3;
            position: relative;
        }

        /* Họa tiết trang trí góc */
        .container::before {
            content: "";
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid #e2d1b3;
            pointer-events: none;
        }

        h1 { 
            text-align: center; 
            color: var(--royal-red); 
            font-family: 'Crimson Pro', serif;
            font-size: 2.5em;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h3 {
            border-left: 4px solid var(--gold-primary);
            padding-left: 15px;
            color: var(--royal-red);
            margin: 40px 0 20px;
        }
        
        .question-card { 
            margin-bottom: 30px; 
            padding: 25px; 
            background: #fff; 
            border-radius: 8px; 
            border-bottom: 3px solid #eee;
            transition: all 0.3s ease;
        }
        
        .question-text { 
            font-weight: 700; 
            display: block; 
            margin-bottom: 20px; 
            font-size: 1.15em;
            color: var(--royal-red);
        }
        
        .options-container { display: flex; flex-direction: column; gap: 12px; }
        
        .option-item { 
            padding: 15px 20px; 
            border: 1px solid #e0e0e0; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.2s;
            background: #fff;
            position: relative;
        }

        .option-item:hover:not(.disabled) { 
            border-color: var(--gold-primary);
            background: #fffcf5;
            transform: translateX(5px);
        }

        /* Trạng thái đúng/sai */
        .option-item.correct-choice { 
            background-color: #d4edda !important; 
            border-color: var(--correct-green) !important; 
            color: var(--correct-green) !important;
            font-weight: bold;
        }
        .option-item.correct-choice::after { content: " ✓"; }

        .option-item.wrong-choice { 
            background-color: #f8d7da !important; 
            border-color: var(--wrong-red) !important; 
            color: var(--wrong-red) !important;
        }
        .option-item.wrong-choice::after { content: " ✗"; }

        .disabled { cursor: not-allowed; opacity: 0.8; }

        .btn-reset { 
            background: var(--gold-primary); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-reset:hover { background: var(--royal-red); transform: scale(1.05); }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
            .taskbar { padding: 10px; font-size: 0.9em; }
        }
    </style>
</head>

let correctCount = 0;
let wrongCount = 0;
let answeredTotal = 0;

function updateTaskbar() {
    document.getElementById('count-correct').innerText = correctCount;
    document.getElementById('count-wrong').innerText = wrongCount;
    document.getElementById('count-total').innerText = answeredTotal;
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function handleSelection(card, selectedIdx, correctIdx) {
    if (card.classList.contains('answered')) return;
    
    card.classList.add('answered');
    answeredTotal++;
    
    const options = card.querySelectorAll('.option-item');
    options.forEach(opt => opt.classList.add('disabled'));

    if (selectedIdx == correctIdx) {
        options[selectedIdx].classList.add('correct-choice');
        correctCount++;
    } else {
        options[selectedIdx].classList.add('wrong-choice');
        options[correctIdx].classList.add('correct-choice');
        wrongCount++;
    }
    updateTaskbar();
}

function render() {
    const container = document.getElementById('quiz-container');
    let html = '<h3>Phần 1: Trắc Nghiệm</h3>';
    
    const shuffledMCQ = shuffle([...mcqData]);
    shuffledMCQ.forEach((item, i) => {
        const correctText = item.a[item.c];
        const options = shuffle([...item.a]);
        const newCorrect = options.indexOf(correctText);
        
        const cardId = `mcq-${i}`;
        html += `<div class="question-card" id="${cardId}">
            <span class="question-text">Câu hỏi ${i+1}: ${item.q}</span>
            <div class="options-container">
                ${options.map((opt, idx) => `
                    <div class="option-item" onclick="handleSelection(document.getElementById('${cardId}'), ${idx}, ${newCorrect})">
                        ${opt}
                    </div>
                `).join('')}
            </div>
        </div>`;
    });

    html += '<h3>Phần 2: Đúng / Sai</h3>';
    const shuffledTF = shuffle([...tfData]);
    shuffledTF.forEach((item, i) => {
        const correctIdx = item.c === "Đúng" ? 0 : 1;
        const cardId = `tf-${i}`;
        html += `<div class="question-card" id="${cardId}">
            <span class="question-text">Câu hỏi ${i+51}: ${item.q}</span>
            <div class="options-container" style="flex-direction: row; gap: 20px;">
                <div class="option-item" style="flex:1; text-align:center;" onclick="handleSelection(document.getElementById('${cardId}'), 0, ${correctIdx})">Đúng</div>
                <div class="option-item" style="flex:1; text-align:center;" onclick="handleSelection(document.getElementById('${cardId}'), 1, ${correctIdx})">Sai</div>
            </div>
        </div>`;
    });
    container.innerHTML = html;
}

window.onload = render;
</script>
</body>
</html>
